name: Facebook Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install ffmpeg -y

      - name: Start Stream
        run: |
          ffmpeg -re -i "https://www.youtube.com/watch?v=teEsU58K7sw" \
          -c:v copy -c:a aac \
          -f flv "rtmps://live-api-s.facebook.com:443/rtmp/"
